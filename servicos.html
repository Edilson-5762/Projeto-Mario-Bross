<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos Serviços</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #c51111;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        /* TABLETS */
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            p {
                font-size: 16px;
            }
        }

        /* CELULARES */
        @media (max-width: 480px) {
            h1 {
                font-size: 20px;
            }

            p {
                font-size: 14px;
            }

            body {
                padding: 15px;
            }
        }
    </style>
</head>

<body>
    <h1>Serviços Prestados</h1>
    <p>Consertos Gerais</p>
</body>

</html>
